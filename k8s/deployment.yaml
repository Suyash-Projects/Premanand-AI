# Kubernetes deployment manifest for Bhakti Marg AI
apiVersion: v1
kind: Namespace
metadata:
  name: bhaktimarg
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bhaktimarg-config
  namespace: bhaktimarg
data:
  APP_NAME: "Bhakti Marg AI"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
---
apiVersion: v1
kind: Secret
metadata:
  name: bhaktimarg-secrets
  namespace: bhaktimarg
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD}@postgresql.bhaktimarg.svc:5432/bhaktimarg"
  REDIS_URL: "redis://redis.bhaktimarg.svc:6379/0"
  GROQ_API_KEY: "${GROQ_API_KEY}"
  OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
  NVIDIA_API_KEY: "${NVIDIA_API_KEY}"
  API_KEY_1: "${API_KEY_1}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bhaktimarg-api
  namespace: bhaktimarg
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bhaktimarg-api
  template:
    metadata:
      labels:
        app: bhaktimarg-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: bhaktimarg/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: bhaktimarg-config
            - secretRef:
                name: bhaktimarg-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/admin/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/admin/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: faiss-index
              mountPath: /app
      volumes:
        - name: faiss-index
          persistentVolumeClaim:
            claimName: bhaktimarg-index
---
apiVersion: v1
kind: Service
metadata:
  name: bhaktimarg-api
  namespace: bhaktimarg
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
  selector:
    app: bhaktimarg-api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bhaktimarg-ingress
  namespace: bhaktimarg
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "60s"
spec:
  ingressClassName: nginx
  rules:
    - host: api.bhaktimarg.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bhaktimarg-api
                port:
                  number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: bhaktimarg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: bhaktimarg
spec:
  type: ClusterIP
  ports:
    - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: bhaktimarg
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bhaktimarg-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: bhaktimarg
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgresql-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: bhaktimarg
spec:
  type: ClusterIP
  ports:
    - port: 5432
  selector:
    app: postgresql
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bhaktimarg-index
  namespace: bhaktimarg
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: bhaktimarg
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-data
  namespace: bhaktimarg
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi